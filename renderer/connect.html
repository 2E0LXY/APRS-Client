<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APRS Client - Connect</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f172a; color: #e2e8f0; height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  user-select: none;
}
.card {
  background: #1e293b; border: 1px solid #334155; border-radius: 16px;
  padding: 40px; width: 460px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { font-size: 28px; font-weight: 800; color: #38bdf8; letter-spacing: -0.5px; }
.logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
.logo .server-badge {
  display: inline-block; background: #1e3a5f; border: 1px solid #2563eb;
  color: #60a5fa; font-size: 11px; padding: 3px 12px; border-radius: 20px;
  margin-top: 10px; font-weight: bold; letter-spacing: 0.5px;
}
.section { margin-bottom: 18px; }
.section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: #64748b; margin-bottom: 10px;
}
label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
input {
  width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px;
  padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none;
  transition: border-color 0.2s; margin-bottom: 12px;
}
input:focus { border-color: #38bdf8; }
input::placeholder { color: #475569; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
.connect-btn {
  width: 100%; background: linear-gradient(135deg, #2563eb, #0284c7);
  border: none; border-radius: 10px; color: #fff; font-size: 15px;
  font-weight: 700; padding: 14px; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s; margin-top: 6px;
}
.connect-btn:hover { opacity: 0.92; transform: translateY(-1px); }
.connect-btn:active { transform: translateY(0); }
.connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status {
  text-align: center; font-size: 12px; color: #64748b;
  margin-top: 12px; min-height: 18px;
}
.status.error { color: #f87171; }
.status.ok { color: #4ade80; }
.checkbox-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  font-size: 13px; color: #94a3b8; cursor: pointer;
}
.checkbox-row input[type=checkbox] { width: auto; margin: 0; accent-color: #38bdf8; }
.divider { border: none; border-top: 1px solid #334155; margin: 18px 0; }
.hint { font-size: 11px; color: #475569; margin: -6px 0 12px; }
.version { text-align: center; font-size: 11px; color: #334155; margin-top: 18px; }
.support-link { text-align: center; font-size: 11px; margin-top: 4px; }
.support-link a { color: #475569; text-decoration: none; }
.support-link a:hover { color: #38bdf8; text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>APRS Client</h1>
    <p>Advanced APRS Desktop Client</p>
    <span class="server-badge">www.aprsnet.uk</span>
  </div>

  <div class="section">
    <div class="section-title">APRS Credentials</div>
    <div class="row">
      <div>
        <label>Your Callsign</label>
        <input type="text" id="callsign" placeholder="M0ABC" style="text-transform:uppercase">
      </div>
      <div>
        <label>APRS-IS Passcode</label>
        <input type="password" id="passcode" placeholder="12345" autocomplete="current-password">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Website Member Account (optional)</div>
    <div class="row">
      <div>
        <label>Member Username</label>
        <input type="text" id="memberUser" placeholder="account name" autocomplete="username">
      </div>
      <div>
        <label>Member Password</label>
        <input type="password" id="memberPass" placeholder="password" autocomplete="current-password">
      </div>
    </div>
    <p class="hint">If set, you are signed in to your aprsnet.uk account automatically.</p>
  </div>

  <hr class="divider">

  <label class="checkbox-row">
    <input type="checkbox" id="autoConnect"> Remember me and connect automatically on startup
  </label>
  <label class="checkbox-row">
    <input type="checkbox" id="minimizeToTray" checked> Minimise to system tray
  </label>
  <label class="checkbox-row">
    <input type="checkbox" id="notifications" checked> Enable desktop notifications
  </label>

  <button class="connect-btn" id="connectBtn" onclick="doConnect()">
    Connect to APRS Net
  </button>

  <div class="status" id="status"></div>
</div>
<div class="version" id="version"></div>
<div class="support-link"><a href="#" id="supportLink">Support Group</a></div>

<script>
var settings = {};

async function init() {
  if (!window.aprsClient) return;
  settings = await window.aprsClient.getSettings();
  var v = await window.aprsClient.getVersion();
  document.getElementById('version').textContent = 'APRS Client v' + v + '  -  www.aprsnet.uk';

  document.getElementById('supportLink').addEventListener('click', function (e) {
    e.preventDefault();
    window.aprsClient.openExternal('https://groups.google.com/g/aprsnetuk');
  });

  if (settings.callsign)   document.getElementById('callsign').value   = settings.callsign.toUpperCase();
  if (settings.passcode)   document.getElementById('passcode').value   = settings.passcode;
  if (settings.memberUser) document.getElementById('memberUser').value = settings.memberUser;
  if (settings.memberPass) document.getElementById('memberPass').value = settings.memberPass;
  document.getElementById('autoConnect').checked    = !!settings.autoConnect;
  document.getElementById('minimizeToTray').checked = settings.minimizeToTray !== false;
  document.getElementById('notifications').checked  = settings.notifications !== false;

  if (settings.autoConnect && settings.callsign) {
    showStatus('Auto-connecting...', 'ok');
    setTimeout(doConnect, 700);
  }
}

async function doConnect() {
  var callsign = document.getElementById('callsign').value.trim().toUpperCase();
  var passcode = document.getElementById('passcode').value.trim();

  var btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  showStatus('Checking server...', '');

  var patch = {
    callsign: callsign,
    passcode: passcode,
    memberUser: document.getElementById('memberUser').value.trim(),
    memberPass: document.getElementById('memberPass').value,
    autoConnect:    document.getElementById('autoConnect').checked,
    minimizeToTray: document.getElementById('minimizeToTray').checked,
    notifications:  document.getElementById('notifications').checked
  };
  await window.aprsClient.saveSettings(patch);

  try {
    var probe = await window.aprsClient.probeServer();
    if (probe && probe.ok) {
      showStatus('Server online' + (probe.data && probe.data.version
                 ? ' (v' + probe.data.version + ')' : '') + ' - opening...', 'ok');
    } else {
      showStatus('Server check failed - opening anyway', 'error');
    }
  } catch (e) {
    showStatus('Server check failed - opening anyway', 'error');
  }

  setTimeout(function () { window.aprsClient.connectToServer(); }, 500);
}

function showStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

document.getElementById('callsign').addEventListener('input', function () {
  this.value = this.value.toUpperCase();
});

window.addEventListener('load', init);
window.aprsClient && window.aprsClient.onSettings(function (s) { settings = s; });
</script>
</body>
</html>
